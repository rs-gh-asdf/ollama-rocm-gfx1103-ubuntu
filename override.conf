[Service]
# Pin Ollama to a specific GPU via the ROCR_VISIBLE_DEVICES env var.
# This is the *physical* HIP device index — check `rocminfo` to find which
# index corresponds to the iGPU you want to use.
#
# On a system with ONE GPU (just the Phoenix iGPU), this is usually 0.
# On a system with an iGPU + an unwanted dGPU, the iGPU index depends on
# PCI ordering — typically the dGPU is 0 and the iGPU is 1.
#
# The model-load runner inherits this env (with patches/03 applied) and
# only ever sees the pinned device. Other GPUs stay reserved for other uses
# (e.g. a discrete GPU for gaming).
Environment="ROCR_VISIBLE_DEVICES=1"

# Bind Ollama's HTTP API to localhost only.
# Change to 0.0.0.0:11434 if you want LAN access (and ideally fronted by
# Tailscale or a similar private overlay network — don't expose to the
# public internet without auth).
Environment="OLLAMA_HOST=127.0.0.1:11434"
